services:
  db:
    image: postgres:16-alpine
    container_name: orkyo-community-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    container_name: orkyo-community-valkey
    command: valkey-server --requirepass ${VALKEY_PASSWORD}
    ports:
      - "${VALKEY_PORT}:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: orkyo-community-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: dev-mem
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: http://localhost:${KEYCLOAK_PORT}
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
    volumes:
      - ./infra/compose/keycloak:/opt/keycloak/data/import
      - ../orkyo-foundation/keycloak/themes/orkyo:/opt/keycloak/themes/orkyo:ro
    ports:
      - "${KEYCLOAK_PORT}:8080"
      - "9001:9000"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: orkyo-community-mailhog
    ports:
      - "${SMTP_PORT}:1025"
      - "${MAILHOG_UI_PORT}:8025"

  migrator:
    build:
      context: ../
      dockerfile: orkyo-community/backend/migrator/Dockerfile.local
    container_name: orkyo-community-migrator
    environment:
      ORKYO_EDITION: community
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__ControlPlane: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      APP_VERSION: ${APP_VERSION}
    command: [migrate, --target, all]
    depends_on:
      db:
        condition: service_healthy
    # No restart policy: the migrator is run-once. Restarting on failure would
    # loop endlessly on a genuinely broken migration (matches SaaS).
    restart: "no"

  api:
    build:
      context: ../
      dockerfile: orkyo-community/backend/api/Dockerfile.local
    container_name: orkyo-community-api
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      keycloak:
        condition: service_healthy
      valkey:
        condition: service_healthy
    env_file: .env
    environment:
      # Container-specific overrides — values that differ from .env (internal Docker
      # hostnames, hardcoded ports). Everything else is inherited from env_file above.
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      # Single-tenant identity under the mixed-case config keys the app binds.
      # .env carries these uppercase (COMMUNITY__*); keep the exact names stable.
      Community__TenantId: ${COMMUNITY__TENANTID}
      Community__TenantSlug: ${COMMUNITY__TENANTSLUG}
      Community__TenantName: ${COMMUNITY__TENANTNAME}
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      OIDC_INTERNAL_AUTHORITY: http://keycloak:8080/realms/${KEYCLOAK_REALM}
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_USE_SSL: "false"
      VALKEY_CONNECTION: "valkey:6379,password=${VALKEY_PASSWORD},abortConnect=false"
      BFF_ENABLED: "true"
      BFF_COOKIE_DOMAIN: ""
      BFF_COOKIE_SECURE: "false"
      BFF_REDIRECT_URI: http://localhost:${API_PORT}/api/auth/bff/callback
      BFF_ALLOWED_HOSTS: localhost,*.localhost
    ports:
      - "${API_PORT}:8080"
    healthcheck:
      # The image installs curl (Dockerfile.local) but not wget — keep this in sync.
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  worker:
    build:
      context: ../
      dockerfile: orkyo-community/backend/worker/Dockerfile.local
    container_name: orkyo-community-worker
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ORKYO_EDITION: community
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Community__TenantId: ${COMMUNITY__TENANTID}
      Community__TenantSlug: ${COMMUNITY__TENANTSLUG}
      Community__TenantName: ${COMMUNITY__TENANTNAME}
      APP_BASE_URL: ${APP_BASE_URL}
      KEYCLOAK_URL: ${KEYCLOAK_URL}
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_BACKEND_CLIENT_ID: ${KEYCLOAK_BACKEND_CLIENT_ID}
      KEYCLOAK_BACKEND_CLIENT_SECRET: ${KEYCLOAK_BACKEND_CLIENT_SECRET}
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_USE_SSL: "false"
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
    depends_on:
      api:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      secrets:
        - npm_token
    container_name: orkyo-community-frontend
    env_file: .env
    environment:
      VITE_API_BASE_URL: http://localhost:${API_PORT}
    ports:
      - "${FRONTEND_PORT}:5173"
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - ../orkyo-foundation/frontend:/foundation:ro
    depends_on:
      api:
        condition: service_healthy

secrets:
  npm_token:
    environment: GHCR_TOKEN

volumes:
  postgres_data:
