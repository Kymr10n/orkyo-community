services:
  db:
    image: postgres:16-alpine
    container_name: orkyo-community-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: orkyo-community-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: dev-mem
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: http://localhost:${KEYCLOAK_PORT}
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
    volumes:
      - ./infra/compose/keycloak:/opt/keycloak/data/import
      - ../orkyo-foundation/keycloak/themes/orkyo:/opt/keycloak/themes/orkyo:ro
    ports:
      - "${KEYCLOAK_PORT}:8080"
      - "9001:9000"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: orkyo-community-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: orkyo-community-mailhog
    ports:
      - "${SMTP_PORT}:1025"
      - "${MAILHOG_UI_PORT}:8025"

  migrator:
    build:
      context: ../
      dockerfile: orkyo-community/backend/migrator/Dockerfile.local
    container_name: orkyo-community-migrator
    environment:
      ORKYO_EDITION: community
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__ControlPlane: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      APP_VERSION: ${APP_VERSION}
    command: [migrate, --target, all]
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  api:
    build:
      context: ../
      dockerfile: orkyo-community/backend/api/Dockerfile.local
    container_name: orkyo-community-api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      keycloak:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Community__TenantId: ${COMMUNITY__TENANTID}
      Community__TenantSlug: ${COMMUNITY__TENANTSLUG}
      Community__TenantName: ${COMMUNITY__TENANTNAME}
      APP_BASE_URL: ${APP_BASE_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      KEYCLOAK_URL: ${KEYCLOAK_URL}
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_BACKEND_CLIENT_ID: ${KEYCLOAK_BACKEND_CLIENT_ID}
      KEYCLOAK_BACKEND_CLIENT_SECRET: ${KEYCLOAK_BACKEND_CLIENT_SECRET}
      OIDC_AUTHORITY: ${OIDC_AUTHORITY}
      OIDC_INTERNAL_AUTHORITY: http://keycloak:8080/realms/${KEYCLOAK_REALM}
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_USE_SSL: "false"
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
      BFF_ENABLED: "true"
      BFF_COOKIE_DOMAIN: ""
      BFF_COOKIE_SECURE: "false"
      BFF_REDIRECT_URI: http://localhost:${API_PORT}/api/auth/bff/callback
      BFF_ALLOWED_HOSTS: localhost,*.localhost
      REDIS_CONNECTION: "redis:6379,password=${REDIS_PASSWORD},abortConnect=false"
      Reporting__Enabled: "true"
      Reporting__BaseUrl: http://superset:8088
      Reporting__PublicBaseUrl: http://localhost:${SUPERSET_PORT}
      Reporting__AdminUsername: ${SUPERSET_ADMIN_USERNAME}
      Reporting__AdminPassword: ${SUPERSET_ADMIN_PASSWORD}
      Reporting__GuestTokenJwtSecret: ${SUPERSET_GUEST_TOKEN_JWT_SECRET}
      Reporting__ReaderCredentialMasterSecret: ${SUPERSET_READER_CREDENTIAL_MASTER_SECRET}
      Reporting__PostgresHost: db
      Reporting__PostgresPort: "5432"
      Reporting__TemplateDashboardIds__space_utilization: ${Reporting__TemplateDashboardIds__space_utilization}
      Reporting__TemplateDashboardIds__request_pipeline: ${Reporting__TemplateDashboardIds__request_pipeline}
      Reporting__TemplateDashboardIds__allocation_conflicts: ${Reporting__TemplateDashboardIds__allocation_conflicts}
    ports:
      - "${API_PORT}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  worker:
    build:
      context: ../
      dockerfile: orkyo-community/backend/worker/Dockerfile.local
    container_name: orkyo-community-worker
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ORKYO_EDITION: community
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Community__TenantId: ${COMMUNITY__TENANTID}
      Community__TenantSlug: ${COMMUNITY__TENANTSLUG}
      Community__TenantName: ${COMMUNITY__TENANTNAME}
      APP_BASE_URL: ${APP_BASE_URL}
      KEYCLOAK_URL: ${KEYCLOAK_URL}
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_BACKEND_CLIENT_ID: ${KEYCLOAK_BACKEND_CLIENT_ID}
      KEYCLOAK_BACKEND_CLIENT_SECRET: ${KEYCLOAK_BACKEND_CLIENT_SECRET}
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_USE_SSL: "false"
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
    depends_on:
      api:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      secrets:
        - npm_token
    container_name: orkyo-community-frontend
    env_file: .env
    environment:
      VITE_API_BASE_URL: http://localhost:${API_PORT}
    ports:
      - "${FRONTEND_PORT}:5173"
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - ../orkyo-foundation/frontend:/foundation:ro
    depends_on:
      api:
        condition: service_healthy

  superset-init:
    build:
      context: .
      dockerfile: infra/compose/superset.Dockerfile
    container_name: orkyo-community-superset-init
    restart: no
    command:
      - /bin/sh
      - -c
      - |
        superset db upgrade &&
        superset init &&
        superset fab create-admin \
          --username "${SUPERSET_ADMIN_USERNAME}" \
          --firstname Dev \
          --lastname Admin \
          --email "${SUPERSET_ADMIN_EMAIL}" \
          --password "${SUPERSET_ADMIN_PASSWORD}" 2>/dev/null || true
    environment:
      SUPERSET_CONFIG_PATH: /app/superset_config.py
      SUPERSET_SECRET_KEY: dev-superset-secret-not-for-production
      SUPERSET_GUEST_TOKEN_JWT_SECRET: ${SUPERSET_GUEST_TOKEN_JWT_SECRET}
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ./infra/compose/superset_config.dev.py:/app/superset_config.py:ro
      - superset_home:/app/superset_home
    depends_on:
      redis:
        condition: service_healthy

  superset:
    build:
      context: .
      dockerfile: infra/compose/superset.Dockerfile
    container_name: orkyo-community-superset
    restart: unless-stopped
    command: ["/usr/bin/run-server.sh"]
    environment:
      SUPERSET_CONFIG_PATH: /app/superset_config.py
      SUPERSET_SECRET_KEY: dev-superset-secret-not-for-production
      SUPERSET_GUEST_TOKEN_JWT_SECRET: ${SUPERSET_GUEST_TOKEN_JWT_SECRET}
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ./infra/compose/superset_config.dev.py:/app/superset_config.py:ro
      - superset_home:/app/superset_home
    ports:
      - "${SUPERSET_PORT}:8088"
    depends_on:
      superset-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

secrets:
  npm_token:
    environment: GHCR_TOKEN

volumes:
  postgres_data:
  superset_home:
