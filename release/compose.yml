# Orkyo Community — Self-Hosted Deployment
#
# Self-deployable: no host bind mounts, no host scripts. All config baked into
# images. Works equally well with `docker compose up -d` and Portainer Stacks.
#
# Required env vars (deploy will fail with a clear message if missing):
#   POSTGRES_PASSWORD, REDIS_PASSWORD, KEYCLOAK_ADMIN_PASSWORD,
#   KEYCLOAK_BACKEND_CLIENT_SECRET, APP_BASE_URL, KEYCLOAK_URL,
#   BFF_COOKIE_DOMAIN, SMTP_HOST, SMTP_FROM_EMAIL, ORKYO_VERSION
#
# Image registry: ghcr.io/kymr10n

name: orkyo-community

services:

  # ── Database ──────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: orkyo_community_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orkyo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set a strong DB password}
      POSTGRES_DB: ${POSTGRES_DB:-orkyo_community}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [orkyo-internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orkyo}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── DB init: create the Keycloak database (idempotent, replaces init-db.sh) ──
  db-init:
    image: postgres:16-alpine
    container_name: orkyo_community_db_init
    restart: "no"
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?}
    networks: [orkyo-internal]
    depends_on:
      db: { condition: service_healthy }
    entrypoint:
      - sh
      - -c
      - |
        psql -h db -U "${POSTGRES_USER:-orkyo}" -d postgres -tAc \
          "SELECT 1 FROM pg_database WHERE datname='${KEYCLOAK_DB:-keycloak}'" \
          | grep -q 1 || \
        psql -h db -U "${POSTGRES_USER:-orkyo}" -d postgres \
          -c "CREATE DATABASE \"${KEYCLOAK_DB:-keycloak}\""

  # ── Redis (BFF sessions, Data Protection keys) ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: orkyo_community_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?set a strong Redis password}
    networks: [orkyo-internal]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Database Migrator (runs once per deploy, then exits) ─────────────────────
  migrator:
    image: ghcr.io/kymr10n/orkyo-community-migrator:${ORKYO_VERSION:?pin a version, e.g. 0.4.2}
    container_name: orkyo_community_migrator
    restart: "no"
    environment:
      ORKYO_EDITION: community
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB:-orkyo_community};Username=${POSTGRES_USER:-orkyo};Password=${POSTGRES_PASSWORD}"
    networks: [orkyo-internal]
    depends_on:
      db: { condition: service_healthy }

  # ── API ───────────────────────────────────────────────────────────────────────
  api:
    image: ghcr.io/kymr10n/orkyo-community-api:${ORKYO_VERSION}
    container_name: orkyo_community_api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB:-orkyo_community};Username=${POSTGRES_USER:-orkyo};Password=${POSTGRES_PASSWORD}"
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-orkyo-community}
      KEYCLOAK_BACKEND_CLIENT_ID: ${KEYCLOAK_BACKEND_CLIENT_ID:-orkyo-backend}
      KEYCLOAK_BACKEND_CLIENT_SECRET: ${KEYCLOAK_BACKEND_CLIENT_SECRET:?set the orkyo-backend OIDC client secret}
      KEYCLOAK_URL: ${KEYCLOAK_URL:?public Keycloak URL, e.g. https://auth.example.com}
      OIDC_AUTHORITY: ${KEYCLOAK_URL}/realms/${KEYCLOAK_REALM:-orkyo-community}
      OIDC_INTERNAL_AUTHORITY: http://keycloak:8080/realms/${KEYCLOAK_REALM:-orkyo-community}
      REDIS_CONNECTION: "redis:6379,password=${REDIS_PASSWORD},abortConnect=false"
      FILE_STORAGE_PATH: /app/storage
      APP_BASE_URL: ${APP_BASE_URL:?public app URL, e.g. https://community.example.com}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-${APP_BASE_URL}}
      BFF_ENABLED: "true"
      BFF_COOKIE_SECURE: ${BFF_COOKIE_SECURE:-true}
      BFF_COOKIE_DOMAIN: ${BFF_COOKIE_DOMAIN:?cookie domain, e.g. community.example.com}
      BFF_ALLOWED_HOSTS: ${BFF_ALLOWED_HOSTS:-${BFF_COOKIE_DOMAIN}}
      BFF_REDIRECT_URI: ${APP_BASE_URL}/api/auth/bff/callback
      SMTP_HOST: ${SMTP_HOST:?SMTP host}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:?sender address, e.g. noreply@example.com}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Orkyo Community}
      COMMUNITY__TENANTID: ${COMMUNITY__TENANTID:-00000000-0000-0000-0000-000000000001}
      COMMUNITY__TENANTSLUG: ${COMMUNITY__TENANTSLUG:-community}
      COMMUNITY__TENANTNAME: ${COMMUNITY__TENANTNAME:-Orkyo Community}
    # Operators behind a reverse proxy may remove this port and route all
    # traffic through the frontend.
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - api_storage:/app/storage
    networks: [orkyo-internal, orkyo-public]
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      migrator: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # ── Worker (background jobs) ──────────────────────────────────────────────────
  worker:
    image: ghcr.io/kymr10n/orkyo-community-worker:${ORKYO_VERSION}
    container_name: orkyo_community_worker
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB:-orkyo_community};Username=${POSTGRES_USER:-orkyo};Password=${POSTGRES_PASSWORD}"
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-orkyo-community}
      KEYCLOAK_BACKEND_CLIENT_ID: ${KEYCLOAK_BACKEND_CLIENT_ID:-orkyo-backend}
      KEYCLOAK_BACKEND_CLIENT_SECRET: ${KEYCLOAK_BACKEND_CLIENT_SECRET}
      OIDC_INTERNAL_AUTHORITY: http://keycloak:8080/realms/${KEYCLOAK_REALM:-orkyo-community}
      REDIS_CONNECTION: "redis:6379,password=${REDIS_PASSWORD},abortConnect=false"
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Orkyo Community}
    networks: [orkyo-internal]
    depends_on:
      api: { condition: service_healthy }

  # ── Frontend (nginx SPA + API proxy) ─────────────────────────────────────────
  frontend:
    image: ghcr.io/kymr10n/orkyo-community-frontend:${ORKYO_VERSION}
    container_name: orkyo_community_frontend
    restart: unless-stopped
    environment:
      API_BASE_URL: ""
    ports:
      - "${FRONTEND_PORT:-80}:8080"
    networks: [orkyo-internal, orkyo-public]
    depends_on:
      api: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Keycloak (identity provider, realm baked into image) ─────────────────────
  keycloak:
    image: ghcr.io/kymr10n/orkyo-community-keycloak:${ORKYO_VERSION}
    container_name: orkyo_community_keycloak
    restart: unless-stopped
    environment:
      KC_DB_URL: jdbc:postgresql://db:5432/${KEYCLOAK_DB:-keycloak}
      KC_DB_USERNAME: ${POSTGRES_USER:-orkyo}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: ${KEYCLOAK_URL}
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      # Permissive by default — typical self-hosted setups put a reverse proxy
      # in front and access Keycloak by both internal and external hostnames.
      # Operators with a single canonical URL may override to "true".
      KC_HOSTNAME_STRICT: ${KC_HOSTNAME_STRICT:-false}
      KC_PROXY_HEADERS: ${KC_PROXY_HEADERS:-xforwarded}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?set a strong Keycloak admin password}
    ports:
      - "${KEYCLOAK_PORT:-9080}:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks: [orkyo-internal, orkyo-public]
    depends_on:
      db-init: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

networks:
  orkyo-internal:
    name: orkyo-community-internal
    driver: bridge
  orkyo-public:
    name: orkyo-community-public
    driver: bridge

volumes:
  postgres_data:
    name: orkyo_community_postgres
  api_storage:
    name: orkyo_community_storage
  keycloak_data:
    name: orkyo_community_keycloak
