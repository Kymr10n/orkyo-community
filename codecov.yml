codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 80%
        only_pulls: true

comment:
  layout: condensed_header, files, condensed_footer
  require_changes: true
  require_base: true

flags:
  backend:
    paths:
      - backend/src/**
      - backend/api/**
      - backend/worker/**
    carryforward: true
  frontend:
    paths:
      - frontend/src/**
    carryforward: true

ignore:
  - "backend/tests/**"
  - "backend/migrations/**"
  - "backend/migrator/**"
  - "backend/**/*Options.cs"
  - "backend/**/*Settings.cs"
  - "backend/**/*Constants.cs"
  - "backend/**/*Extensions.cs"
  - "backend/**/Program.cs"
  - "frontend/src/**/*.test.*"
  - "frontend/src/**/*.spec.*"
  - "frontend/src/**/*.d.ts"
  - "frontend/vite.config.*"
  - "frontend/eslint.config.*"
