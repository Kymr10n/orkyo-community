version: 2

registries:
  github-nuget:
    type: nuget-feed
    url: https://nuget.pkg.github.com/Kymr10n/index.json
    token: ${{secrets.GHCR_TOKEN}}

updates:
  - package-ecosystem: nuget
    directory: /backend
    schedule:
      interval: daily
      time: "06:00"
    registries:
      - github-nuget
    groups:
      orkyo-foundation:
        patterns: ["Orkyo.*"]
    open-pull-requests-limit: 10
    labels: [dependencies, backend]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: [dependencies, frontend]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, ci]
