version: 2

registries:
  github-nuget:
    type: nuget-feed
    url: https://nuget.pkg.github.com/Kymr10n/index.json
    token: ${{secrets.GHCR_TOKEN}}

updates:
  - package-ecosystem: nuget
    directory: /backend
    schedule:
      interval: weekly
    registries:
      - github-nuget
    ignore:
      # Orkyo.* packages are bumped automatically by foundation's nightly dispatch.
      # Dependabot PRs for these duplicate that work and waste CI minutes.
      - dependency-name: "Orkyo.*"
    open-pull-requests-limit: 10
    labels: [dependencies, backend]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: [dependencies, frontend]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, ci]
