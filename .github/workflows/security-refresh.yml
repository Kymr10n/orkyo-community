name: Security Refresh

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

permissions: {}

env:
  REGISTRY: ghcr.io/kymr10n
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh-frontend:
    name: Refresh Frontend Base Image
    timeout-minutes: 20
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build refreshed frontend image (no-cache)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: frontend
          file: frontend/Dockerfile.prod
          push: true
          tags: ${{ env.REGISTRY }}/orkyo-community-frontend:security-refresh
          no-cache: true

      - name: Trivy — scan
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/orkyo-community-frontend:security-refresh
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Create or reopen issue on failure
        if: steps.trivy.outcome == 'failure'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const title = '🔒 Security: HIGH/CRITICAL CVEs in community-frontend base image';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'all', labels: ['security'], per_page: 10,
            });
            const existing = issues.find(i => i.title === title);
            const body = `Vulnerability detected. Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            if (existing) {
              if (existing.state === 'closed') await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, state: 'open' });
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['security'] });
            }

      - name: Fail if vulnerabilities found
        if: steps.trivy.outcome == 'failure'
        run: exit 1
