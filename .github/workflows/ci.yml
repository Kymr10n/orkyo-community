name: CI

on:
  pull_request:
    paths:
      - '.github/workflows/ci.yml'
      - 'Orkyo.Community.slnx'
      - 'backend/**'
      - 'frontend/**'
      - 'dev.sh'
      - '.env.template'
  push:
    branches: [main]
    paths:
      - '.github/workflows/ci.yml'
      - 'Orkyo.Community.slnx'
      - 'backend/**'
      - 'frontend/**'
      - 'dev.sh'
      - '.env.template'

concurrency:
  group: community-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  frontend:
    name: Frontend — install, lint, typecheck, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout community
        uses: actions/checkout@v4

      - name: Checkout foundation
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/orkyo-foundation
          path: orkyo-foundation
          token: ${{ github.token }}

      - name: Link foundation sibling path
        run: ln -sfn "$GITHUB_WORKSPACE/orkyo-foundation" "$GITHUB_WORKSPACE/../orkyo-foundation"

      - name: Sync brand assets
        run: |
          mkdir -p frontend/public
          cp orkyo-foundation/assets/orkyo-favicon-pack/*.png frontend/public/ 2>/dev/null || true
          cp orkyo-foundation/assets/orkyo-favicon-pack/favicon.ico frontend/public/ 2>/dev/null || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Typecheck
        run: npm run typecheck
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  backend:
    name: Backend — restore, build, test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: orkyo_community
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout community
        uses: actions/checkout@v4

      - name: Checkout foundation
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/orkyo-foundation
          path: ../orkyo-foundation
          token: ${{ github.token }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Orkyo.Community.slnx

      - name: Build
        run: dotnet build Orkyo.Community.slnx --no-restore

      - name: Run migrator smoke test
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=orkyo_community;Username=postgres;Password=postgres"
        run: dotnet run --project backend/migrator/Orkyo.Community.Migrator.csproj -- migrate --target all

      - name: Validate API config
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=orkyo_community;Username=postgres;Password=postgres"
          OIDC_AUTHORITY: "http://localhost:8180/realms/orkyo"
          KEYCLOAK_URL: "http://localhost:8180"
          KEYCLOAK_REALM: "orkyo"
          KEYCLOAK_BACKEND_CLIENT_ID: "orkyo-backend"
          KEYCLOAK_BACKEND_CLIENT_SECRET: "changeme"
          APP_BASE_URL: "http://localhost:8080"
          FILE_STORAGE_PATH: "/tmp/community-storage"
          SMTP_HOST: "localhost"
          SMTP_PORT: "1025"
          SMTP_USE_SSL: "false"
          SMTP_FROM_EMAIL: "noreply@example.com"
          SMTP_FROM_NAME: "Orkyo"
        run: dotnet run --project backend/api/Orkyo.Community.Api.csproj -- --validate
