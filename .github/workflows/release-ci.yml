name: CI

# Triggers:
#   pull_request to main     — security audits + build + test + smoke (no push)
#   push to main             — + build images (sha) + container scan
#   push to v* tags          — + assemble release bundle + smoke-selfhosted + GH Release
#   workflow_dispatch        — manual run
#   repository_dispatch      — fired by orkyo-foundation when a new package is published.
#                              channel=nightly: validate-only (floating OrkyoFoundationVersion).
#                              channel=stable:  open auto-bump PR with regenerated lock files.

on:
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**']
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore: ['**.md', 'docs/**']
  workflow_dispatch:
  repository_dispatch:
    types: [foundation_updated]

concurrency:
  group: release-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

env:
  REGISTRY: ghcr.io/kymr10n
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # NIGHTLY CHANGE CHECK
  # ─────────────────────────────────────────────
  nightly-change-check:
    name: Nightly Change Check
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - name: Check for code changes since last successful nightly
        id: check
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: 'release-ci.yml', event: 'schedule',
              status: 'success', per_page: 1,
            });
            if (runs.workflow_runs.length === 0) { core.setOutput('has_changes', 'true'); return; }
            const lastSha = runs.workflow_runs[0].head_sha;
            core.setOutput('has_changes', lastSha !== context.sha ? 'true' : 'false');
            if (lastSha === context.sha) core.notice('No changes since last nightly — skipping');


  # ─────────────────────────────────────────────
  # DEPENDENCY REVIEW — PRs only
  # ─────────────────────────────────────────────
  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
  # ─────────────────────────────────────────────
  # SECURITY AUDITS — three parallel jobs, all gate downstream builds
  # ─────────────────────────────────────────────
  audit-secrets:
    name: audit / secrets + fs
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: [nightly-change-check]
    if: >-
      !cancelled() &&
      (github.event_name != 'schedule' ||
       needs.nightly-change-check.outputs.has_changes == 'true')

    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout (full history for secret scan)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Gitleaks secret scan
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose --exit-code 1

      - name: Trivy — IaC config scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Trivy — filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Migration header lint
        run: bash scripts/ci/lint-migration-headers.sh backend/migrations/sql

  audit-nuget:
    name: audit / NuGet
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: [nightly-change-check]
    if: >-
      !cancelled() &&
      (github.event_name != 'schedule' ||
       needs.nightly-change-check.outputs.has_changes == 'true')

    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          global-json-file: global.json
          source-url: https://nuget.pkg.github.com/Kymr10n/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore
        run: dotnet restore Orkyo.Community.slnx --locked-mode

      - name: Check for vulnerable packages
        run: |
          output=$(dotnet list Orkyo.Community.slnx package --vulnerable --include-transitive 2>&1)
          echo "$output"
          if echo "$output" | grep -qi "has the following vulnerable packages"; then
            echo "::error::Vulnerable NuGet packages detected"; exit 1
          fi

  audit-npm:
    name: audit / npm
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: [nightly-change-check]
    if: >-
      !cancelled() &&
      (github.event_name != 'schedule' ||
       needs.nightly-change-check.outputs.has_changes == 'true')

    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure npm for GitHub Packages (@kymr10n/foundation)
        run: |
          echo "@kymr10n:registry=https://npm.pkg.github.com" > frontend/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GHCR_TOKEN }}" >> frontend/.npmrc

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: npm audit
        run: npm audit --audit-level=high --omit=dev
        working-directory: frontend

      - name: License scan (open-source distribution requirement)
        run: |
          npx --yes license-checker@^25.0.1 \
            --summary --excludePrivatePackages \
            --failOn "GPL-2.0;GPL-3.0;AGPL-3.0;LGPL-2.0;LGPL-2.1;LGPL-3.0"
        working-directory: frontend

  # ─────────────────────────────────────────────
  # BACKEND CI
  # ─────────────────────────────────────────────
  backend-ci:
    name: backend-ci
    timeout-minutes: 20
    runs-on: ubuntu-latest
    needs: [nightly-change-check, audit-secrets, audit-nuget, audit-npm]
    if: >-
      !cancelled() &&
      (github.event_name != 'schedule' ||
       needs.nightly-change-check.outputs.has_changes == 'true')

    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          global-json-file: global.json
          source-url: https://nuget.pkg.github.com/Kymr10n/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache NuGet packages
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.nuget/packages
          key: nuget-community-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: nuget-community-

      - name: Restore
        run: dotnet restore Orkyo.Community.slnx --locked-mode

      - name: Format check
        run: dotnet format Orkyo.Community.slnx --verify-no-changes --no-restore

      - name: Build
        run: dotnet build Orkyo.Community.slnx -c Release --no-restore -warnaserror

      - name: Test
        run: |
          dotnet test Orkyo.Community.slnx \
            -c Release --no-build \
            --verbosity normal \
            --logger GitHubActions \
            --collect:"XPlat Code Coverage" \
            --results-directory backend/TestResults

      - name: Upload backend coverage to Codecov
        if: always()
        uses: codecov/codecov-action@ad3126e916f78f00edff4ed0317cf185271ccc2d # v5.4.2
        with:
          directory: backend/TestResults
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────────────
  # FRONTEND CI
  # ─────────────────────────────────────────────
  frontend-ci:
    name: frontend-ci
    timeout-minutes: 20
    runs-on: ubuntu-latest
    needs: [nightly-change-check, audit-secrets, audit-nuget, audit-npm]
    if: >-
      !cancelled() &&
      (github.event_name != 'schedule' ||
       needs.nightly-change-check.outputs.has_changes == 'true')

    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure npm for GitHub Packages (@kymr10n/foundation)
        run: |
          echo "@kymr10n:registry=https://npm.pkg.github.com" > frontend/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GHCR_TOKEN }}" >> frontend/.npmrc

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Type check
        run: npm run typecheck
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Test with coverage
        run: npm run test:coverage
        working-directory: frontend

      - name: Upload frontend coverage to Codecov
        if: always()
        uses: codecov/codecov-action@ad3126e916f78f00edff4ed0317cf185271ccc2d # v5.4.2
        with:
          files: frontend/coverage/cobertura-coverage.xml
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────────────
  # SMOKE TESTS — gates image builds
  # ─────────────────────────────────────────────
  smoke-tests:
    name: smoke-tests
    timeout-minutes: 15
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci, nightly-change-check]
    if: >-
      !failure() && !cancelled() &&
      (github.event_name != 'schedule' ||
       needs.nightly-change-check.outputs.has_changes == 'true')

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 6379:6379

    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          global-json-file: global.json
          source-url: https://nuget.pkg.github.com/Kymr10n/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore
        run: dotnet restore Orkyo.Community.slnx --locked-mode

      - name: Build
        run: dotnet build Orkyo.Community.slnx -c Release --no-restore

      - name: Validate config contract
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=orkyo_community_ci;Username=postgres;Password=postgres"
          ASPNETCORE_URLS: "http://+:5002"
          CORS_ALLOWED_ORIGINS: "http://localhost:5002"
          KEYCLOAK_URL: "http://localhost:8082"
          KEYCLOAK_REALM: "orkyo-community"
          KEYCLOAK_BACKEND_CLIENT_ID: "orkyo-backend"
          KEYCLOAK_BACKEND_CLIENT_SECRET: "ci-secret"
          OIDC_AUTHORITY: "http://localhost:8082/realms/orkyo-community"
          JWT_ISSUER: "orkyo-api"
          JWT_AUDIENCE: "orkyo-app"
          JWT_SECRET: "ci-test-secret-at-least-32-characters-long"
          SMTP_HOST: "localhost"
          SMTP_PORT: "1025"
          SMTP_USE_SSL: "false"
          SMTP_FROM_EMAIL: "noreply@ci.local"
          SMTP_FROM_NAME: "Orkyo CI"
          FILE_STORAGE_PATH: "/tmp/orkyo-ci-storage"
          APP_BASE_URL: "http://localhost:5002"
          REDIS_CONNECTION: "localhost:6379,abortConnect=false"
        run: |
          dotnet run --no-build -c Release \
            --project backend/api/Orkyo.Community.Api.csproj \
            -- --validate

      - name: Create tenant database
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres \
            -c "CREATE DATABASE orkyo_community_ci;" || true

      - name: Run migrator
        env:
          DEFAULT_CONNECTION_STRING: "Host=localhost;Port=5432;Database=orkyo_community_ci;Username=postgres;Password=postgres"
          APP_VERSION: ci-${{ github.sha }}
        run: |
          dotnet run --no-build -c Release \
            --project backend/migrator/Orkyo.Community.Migrator.csproj \
            -- migrate --target all

      - name: Start API and verify health
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=orkyo_community_ci;Username=postgres;Password=postgres"
          ASPNETCORE_URLS: "http://+:5002"
          CORS_ALLOWED_ORIGINS: "http://localhost:5002"
          KEYCLOAK_URL: "http://localhost:8082"
          KEYCLOAK_REALM: "orkyo-community"
          KEYCLOAK_BACKEND_CLIENT_ID: "orkyo-backend"
          KEYCLOAK_BACKEND_CLIENT_SECRET: "ci-secret"
          OIDC_AUTHORITY: "http://localhost:8082/realms/orkyo-community"
          JWT_ISSUER: "orkyo-api"
          JWT_AUDIENCE: "orkyo-app"
          JWT_SECRET: "ci-test-secret-at-least-32-characters-long"
          SMTP_HOST: "localhost"
          SMTP_PORT: "1025"
          SMTP_USE_SSL: "false"
          SMTP_FROM_EMAIL: "noreply@ci.local"
          SMTP_FROM_NAME: "Orkyo CI"
          FILE_STORAGE_PATH: "/tmp/orkyo-ci-storage"
          APP_BASE_URL: "http://localhost:5002"
          REDIS_CONNECTION: "localhost:6379,abortConnect=false"
        run: |
          dotnet run --no-build -c Release \
            --project backend/api/Orkyo.Community.Api.csproj \
            > /tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid

          for i in $(seq 1 30); do
            if curl -sf http://localhost:5002/health/live >/dev/null 2>&1; then
              echo "API healthy after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start"; tail -n 100 /tmp/api.log; exit 1

      - name: Teardown
        if: always()
        run: |
          [ -f /tmp/api.pid ] && kill "$(cat /tmp/api.pid)" 2>/dev/null || true

  # ─────────────────────────────────────────────
  # BUILD IMAGES — main + v* tags, after smoke
  # ─────────────────────────────────────────────
  build-images:
    name: Build Images (${{ matrix.service }})
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: [smoke-tests]
    if: >-
      !failure() && !cancelled() &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: api
            dockerfile: backend/api/Dockerfile
          - service: worker
            dockerfile: backend/worker/Dockerfile
          - service: migrator
            dockerfile: backend/migrator/Dockerfile
          - service: frontend
            dockerfile: frontend/Dockerfile
            context: frontend
            no_secret: true
          - service: keycloak
            dockerfile: backend/keycloak/Dockerfile
            context: .
            no_secret: true
      fail-fast: false

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push (backend)
        if: matrix.no_secret != true
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/orkyo-community-${{ matrix.service }}:sha-${{ github.sha }}
          secrets: nuget_token=${{ secrets.GHCR_TOKEN }}
          cache-from: type=gha,scope=community-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=community-${{ matrix.service }}

      - name: Build and push (frontend — needs GHCR_TOKEN for @kymr10n/foundation)
        if: matrix.no_secret == true
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/orkyo-community-${{ matrix.service }}:sha-${{ github.sha }}
          secrets: ghcr_token=${{ secrets.GHCR_TOKEN }}
          cache-from: type=gha,scope=community-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=community-${{ matrix.service }}

  # ─────────────────────────────────────────────
  # CONTAINER SCAN
  # ─────────────────────────────────────────────
  container-scan:
    name: Container Scan (${{ matrix.service }})
    timeout-minutes: 15
    runs-on: ubuntu-latest
    needs: [build-images]
    if: >-
      !failure() && !cancelled() &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    strategy:
      matrix:
        service: [api, worker, migrator, frontend, keycloak]
      fail-fast: false

    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Trivy — image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/orkyo-community-${{ matrix.service }}:sha-${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Verify non-root container
        if: matrix.service != 'frontend'
        run: |
          uid=$(docker run --rm \
            ${{ env.REGISTRY }}/orkyo-community-${{ matrix.service }}:sha-${{ github.sha }} \
            id -u 2>/dev/null || echo "999")
          if [ "$uid" = "0" ]; then
            echo "::error::${{ matrix.service }} runs as root"; exit 1
          fi

      - name: Generate SBOM
        uses: anchore/sbom-action@f325610c9f50a54015d37c8d16cb3b0e2c8f4de0 # v0.18.0
        with:
          image: ${{ env.REGISTRY }}/orkyo-community-${{ matrix.service }}:sha-${{ github.sha }}
          format: spdx-json
          output-file: sbom-${{ matrix.service }}.spdx.json
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GHCR_TOKEN }}

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-${{ matrix.service }}-${{ github.sha }}
          path: sbom-${{ matrix.service }}.spdx.json
          retention-days: 90

  # ─────────────────────────────────────────────
  # RELEASE BUNDLE + SMOKE + GH RELEASE — v* only
  # ─────────────────────────────────────────────
  assemble-selfhosted:
    name: Assemble Release Bundle
    timeout-minutes: 15
    runs-on: ubuntu-latest
    needs: [container-scan]
    if: >-
      !failure() && !cancelled() &&
      startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MAJOR="${VERSION%%.*}"
          MINOR="${VERSION%.*}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "MAJOR=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "MINOR=$MINOR" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Provenance gate — verify all SHA images exist
        run: |
          for svc in api worker migrator frontend keycloak; do
            IMAGE="${{ env.REGISTRY }}/orkyo-community-${svc}:sha-${{ github.sha }}"
            echo "Checking: $IMAGE"
            if ! docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
              echo "::error::SHA image not found: $IMAGE"
              echo "::error::Push to main must succeed before creating a release tag"
              exit 1
            fi
          done

      - name: Re-tag images (no rebuild)
        env:
          V: ${{ steps.version.outputs.VERSION }}
          MINOR: ${{ steps.version.outputs.MINOR }}
          MAJOR: ${{ steps.version.outputs.MAJOR }}
        run: |
          for svc in api worker migrator frontend keycloak; do
            SHA_IMG="${{ env.REGISTRY }}/orkyo-community-${svc}:sha-${{ github.sha }}"
            docker pull "$SHA_IMG"
            for tag in "$V" "$MINOR" "$MAJOR"; do
              docker tag "$SHA_IMG" "${{ env.REGISTRY }}/orkyo-community-${svc}:${tag}"
              docker push "${{ env.REGISTRY }}/orkyo-community-${svc}:${tag}"
            done
          done

      - name: Assemble release bundle
        run: bash scripts/ci/assemble-release.sh "${{ steps.version.outputs.VERSION }}" dist

      - name: Upload bundle artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-bundle
          path: dist/
          retention-days: 1

  smoke-selfhosted:
    name: Smoke — Self-Hosted Bundle
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: [assemble-selfhosted]
    if: >-
      !failure() && !cancelled() &&
      startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read
    steps:
      - name: Download release bundle
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: release-bundle
          path: dist/

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify checksum
        run: |
          cd dist
          sha256sum -c "orkyo-community-v${{ steps.version.outputs.VERSION }}.zip.sha256"

      - name: Unpack bundle
        run: |
          cd dist
          unzip "orkyo-community-v${{ steps.version.outputs.VERSION }}.zip"

      - name: Generate test .env
        run: |
          BUNDLE="dist/orkyo-community-v${{ steps.version.outputs.VERSION }}"
          cat > "$BUNDLE/.env" <<'EOF'
          POSTGRES_USER=orkyo
          POSTGRES_PASSWORD=ci-postgres-password
          POSTGRES_DB=orkyo_community
          KEYCLOAK_DB=keycloak
          REDIS_PASSWORD=ci-redis-password
          APP_BASE_URL=http://localhost
          KEYCLOAK_URL=http://localhost:9080
          KEYCLOAK_ADMIN=admin
          KEYCLOAK_ADMIN_PASSWORD=ci-keycloak-admin-password
          KEYCLOAK_REALM=orkyo-community
          KEYCLOAK_BACKEND_CLIENT_ID=orkyo-backend
          KEYCLOAK_BACKEND_CLIENT_SECRET=ci-backend-client-secret
          BFF_COOKIE_DOMAIN=localhost
          BFF_COOKIE_SECURE=false
          SMTP_HOST=localhost
          SMTP_PORT=1025
          SMTP_USE_SSL=false
          SMTP_FROM_EMAIL=noreply@ci.local
          SMTP_FROM_NAME=Orkyo CI
          EOF

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Start full stack (incl. Keycloak — exercises baked realm import)
        working-directory: dist/orkyo-community-v${{ steps.version.outputs.VERSION }}
        run: docker compose up -d

      - name: Wait for Keycloak to import realm and be ready
        working-directory: dist/orkyo-community-v${{ steps.version.outputs.VERSION }}
        run: |
          echo "Waiting for Keycloak (timeout 180s) — exercises baked realm import..."
          if timeout 180 bash -c \
            'until curl -sf -o /dev/null http://localhost:9080/realms/orkyo-community; do sleep 3; done'; then
            echo "Keycloak realm available"
          else
            echo "::error::Keycloak failed to start or import realm within 180s"
            docker compose logs keycloak --tail 100
            exit 1
          fi

      - name: Wait for API to be healthy
        working-directory: dist/orkyo-community-v${{ steps.version.outputs.VERSION }}
        run: |
          echo "Waiting for API (timeout 120s)..."
          if timeout 120 bash -c \
            'until curl -sf http://localhost:8080/health >/dev/null 2>&1; do sleep 3; done'; then
            echo "API healthy"
          else
            echo "::error::API did not become healthy within 120s"
            docker compose logs --tail 50
            exit 1
          fi

      - name: Verify frontend serves
        run: curl -sf http://localhost/ | grep -q html || (echo "::error::Frontend not responding"; exit 1)

      - name: Teardown
        if: always()
        working-directory: dist/orkyo-community-v${{ steps.version.outputs.VERSION }}
        run: docker compose down -v

  create-release:
    name: Create GitHub Release
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: [smoke-selfhosted]
    if: >-
      !failure() && !cancelled() &&
      startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release bundle
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: release-bundle
          path: dist/

      - name: Download SBOMs
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          pattern: sbom-*-${{ github.sha }}
          path: sboms/
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/orkyo-community-v${{ steps.version.outputs.VERSION }}.zip \
            dist/orkyo-community-v${{ steps.version.outputs.VERSION }}.zip.sha256 \
            sboms/*.spdx.json \
            --generate-notes \
            --title "Orkyo Community ${{ github.ref_name }}"

  # ─────────────────────────────────────────────
  # AUTO-BUMP — fires on every foundation publish (nightly + stable)
  #
  # Main always reflects the latest foundation publish. The bump commits
  # directly to main (no PR); the resulting push: main triggers the full
  # audit/build/test chain as the validation gate. If foundation broke us,
  # main goes red — visible, immediate, actionable.
  # ─────────────────────────────────────────────
  auto-bump:
    name: Auto-bump Foundation (${{ github.event.client_payload.channel }})
    timeout-minutes: 15
    runs-on: ubuntu-latest
    if: github.event_name == 'repository_dispatch'
    permissions:
      contents: write
      issues: write

    env:
      FOUNDATION_VERSION: ${{ github.event.client_payload.version }}
      CHANNEL: ${{ github.event.client_payload.channel }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # GHCR_TOKEN so the resulting commit triggers downstream CI
          # (commits from GITHUB_TOKEN do not, by design).
          token: ${{ secrets.GHCR_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump foundation pin
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: scripts/bump-foundation.sh "${FOUNDATION_VERSION}"

      - name: Commit and push to main
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes — foundation pin already at ${FOUNDATION_VERSION}"
            exit 0
          fi
          git commit -m "chore: bump foundation to ${FOUNDATION_VERSION} (${CHANNEL})"
          git push origin HEAD:main

      - name: Create failure issue if auto-bump fails
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          TITLE="Auto-bump failed: foundation ${FOUNDATION_VERSION} (${CHANNEL})"
          BODY="The \`auto-bump\` job failed for foundation version \`${FOUNDATION_VERSION}\` on channel \`${CHANNEL}\`.

          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Check the run logs and re-trigger the bump manually if needed."
          EXISTING=$(gh issue list --state open --search "$TITLE" --json number --jq '.[0].number // ""')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label "ci-failure"
          fi

  # ─────────────────────────────────────────────
  # EVIDENCE BUNDLE — always
  # ─────────────────────────────────────────────
  release-evidence-bundle:
    name: Release Evidence
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs:
      - nightly-change-check
      - audit-secrets
      - audit-nuget
      - audit-npm
      - backend-ci
      - frontend-ci
      - smoke-tests
      - build-images
      - container-scan
      - assemble-selfhosted
      - smoke-selfhosted
      - create-release
      - auto-bump
    if: always()

    permissions:
      contents: read
    steps:
      - name: Collect job results
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const jobs = ${{ toJSON(needs) }};
            const lines = ['# Release Evidence Bundle', '',
              `**Run:** ${context.runId}`, `**SHA:** ${context.sha}`,
              `**Ref:** ${context.ref}`, `**Event:** ${context.eventName}`,
              '', '## Job Results', ''];
            for (const [job, result] of Object.entries(jobs)) {
              const icon = result.result === 'success' ? '✅'
                : result.result === 'skipped' ? '⏭️' : '❌';
              lines.push(`${icon} **${job}**: ${result.result}`);
            }
            await core.summary.addRaw(lines.join('\n')).write();
