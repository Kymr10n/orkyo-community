<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="/orkyo-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/orkyo-32.png" />
    <link rel="icon" type="image/png" sizes="32x32"
          href="/orkyo-32.png"
          media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" sizes="32x32"
          href="/orkyo-dark-32.png"
          media="(prefers-color-scheme: dark)" />
    <link rel="apple-touch-icon" sizes="180x180" href="/orkyo-180.png" />
    <link rel="manifest" href="manifest.webmanifest" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="light dark" />

    <!-- Eliminate the white flash before React hydrates and before Keycloak
         redirects. Runs synchronously in <head> before any paint:
         1. Sets the inline background on <html> so the viewport is never white.
         2. Adds/removes the "dark" class so Tailwind's .dark body rules fire
            immediately — preventing the body from showing its default white
            background before the app store applies the class. -->
    <script>
      (function(){
        var t=localStorage.getItem('theme');
        var dark=t==='dark'||(t!=='light'&&window.matchMedia('(prefers-color-scheme: dark)').matches);
        var root=document.documentElement;
        root.style.background=dark?'#09090b':'#ffffff';
        if(dark){root.classList.add('dark')}else{root.classList.remove('dark')}
      })();
    </script>

    <title>Orkyo</title>
  </head>
  <body>
    <div id="root">
      <!-- Static boot shell rendered inside #root. React clears #root on mount,
           so both the spinner and the fallback vanish the instant the app boots.
           If the app never mounts (e.g. an anonymizing proxy that re-hosts the
           ES-module chunks cross-origin so they fail to load), the .boot-fallback
           message reveals itself after a timeout instead of an endless spinner.
           Pure HTML/CSS — no JS, no CSP change needed. -->
      <style>
        .app-loader{display:flex;align-items:center;justify-content:center;height:100vh;background:#09090b}
        html:not(.dark) .app-loader{background:#ffffff}
        .app-loader>div{width:24px;height:24px;border:2px solid #3b82f6;border-top-color:transparent;border-radius:50%;animation:l .6s linear infinite}
        @keyframes l{to{transform:rotate(360deg)}}
        .boot-fallback{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:24px;text-align:center;font-family:system-ui,-apple-system,sans-serif;background:#09090b;color:#fafafa;opacity:0;visibility:hidden;animation:bootReveal .4s ease 10s forwards}
        html:not(.dark) .boot-fallback{background:#ffffff;color:#18181b}
        .boot-fallback h1{font-size:1.125rem;font-weight:600;margin:0}
        .boot-fallback p{font-size:.875rem;max-width:34rem;line-height:1.5;margin:0;color:#a1a1aa}
        html:not(.dark) .boot-fallback p{color:#52525b}
        @keyframes bootReveal{to{opacity:1;visibility:visible}}
      </style>
      <div class="app-loader"><div></div></div>
      <div class="boot-fallback">
        <h1>Taking longer than expected…</h1>
        <p>If you’re viewing Orkyo through a privacy viewer or proxy, it can’t run there —
           open this page directly in your browser instead.</p>
      </div>
    </div>
    <script src="/__runtime_config.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
