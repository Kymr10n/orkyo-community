# Security headers — included at server level AND in every location that declares
# its own add_header (nginx add_header inheritance: a location with any add_header
# of its own drops ALL headers inherited from the server block).
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
