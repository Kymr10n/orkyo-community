server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    charset utf-8;

    # Security headers — included here AND in every location below that declares its
    # own add_header (nginx drops inherited add_header directives in such locations).
    include /etc/nginx/snippets/security-headers.conf;

    # Runtime config — injected at container start, must never be cached
    location = /__runtime_config.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # Never cache index.html — a stale index would reference deleted hashed chunks
    # after a deploy. Exact match wins over the regex/prefix locations; the default
    # root lookup serves the file, no try_files needed.
    location = /index.html {
        add_header Cache-Control "no-cache";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # Cache static assets with content hash (JS, CSS from Vite build)
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # Cache images and fonts
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Keycloak (OIDC) — Community uses path-prefix /auth on the same domain.
    # KC_HOSTNAME adds /auth publicly but Keycloak serves at / internally; strip the prefix.
    # ^~ ensures this block takes priority over the regex rules below (e.g. .css/.js caching),
    # so Keycloak's static assets (themes, resources) are proxied, not served from disk.
    location ^~ /auth/ {
        proxy_pass http://keycloak:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;
    }

    # Health check endpoint
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
        include /etc/nginx/snippets/security-headers.conf;
    }

    # SPA fallback — all unmatched routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
